<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Build City BR</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <!-- Top Bar -->
    <div class="top-bar">
      <div class="time">14:43</div>
      <div class="money">R$ <span id="money">156370</span></div>
      <div class="population">👥 204</div>
      <div class="happiness">❤️ 129/100</div>
    </div>

    <!-- Left Menu -->
    <div class="left-menu" id="menu">
      <!-- Categorias serão inseridas via JS -->
    </div>

    <!-- Game View -->
    <div class="game-view" id="game-view">
      <canvas id="city-canvas"></canvas>
      <div class="time-of-day" id="time-of-day">Evening</div>
    </div>

    <!-- Right Panel -->
    <div class="right-panel">
      <button class="btn-stats">📊 STATS</button>
      <button class="btn-demolish" id="demolish-btn">🗑 DEMOLIR</button>
    </div>

    <!-- Complaints -->
    <div class="complaints" id="complaints">
      <h3>🚨 RECLAMAÇÕES (3)</h3>
      <div class="complaint">Necessitamos de mais policiais!</div>
      <div class="complaint">Poluição do ar muito alta!</div>
      <div class="complaint">Criminalidade alta na zona leste!</div>
    </div>

    <!-- Build Button -->
    <button class="build-btn">+</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
